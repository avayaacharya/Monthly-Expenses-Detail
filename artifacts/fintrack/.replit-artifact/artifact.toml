kind = "web"
previewPath = "/"
title = "FinTrack — Personal Expense Tracker"
version = "1.0.0"
id = "artifacts/fintrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23162

[services.development]
run = "pnpm --filter @workspace/fintrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fintrack", "run", "build" ]
publicDir = "artifacts/fintrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23162"
BASE_PATH = "/"
